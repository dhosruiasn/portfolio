    <meta charset="UTF-8" />

    <!-- Hero ASCII 的來源圖：優先預載，避免首訪時松鼠要刷新好幾次才出現 -->
    <link rel="preload" as="image" href="/portfolio/images/hero-character.png" fetchpriority="high" />

    <meta name="theme-color" content="#ec5b2b" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Doris Kao — Digital Web Designer</title>
    <meta name="description" content="Doris Kao（高萱彤）— Brand × Visual × Interaction × VibeCoding" />
    <!-- 字型改用 <link>+preconnect：原本在 global.css 用 @import 會 render-blocking 且序列化
         （先抓 css 才發現 @import 再抓字型）。英文字型全站都用→正常載入；中文字型（TASA/Chiron/
         Chocolate）只在 Pickmin 案例的多語字體示範用到，主站中文走系統字，故非阻斷延後載入。 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ojuju:wght@700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&display=swap" />

    <link rel="stylesheet" crossorigin href="/portfolio/assets/index-B-fhGH-K.css">
